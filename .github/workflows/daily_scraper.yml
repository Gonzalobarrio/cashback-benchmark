name: Daily Cashback Benchmark

on:
  schedule:
    - cron: '0 7 * * *'  # Cada día a las 7:00 UTC (9:00 hora Polonia)
  workflow_dispatch:      # Permite ejecutarlo manualmente también

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas playwright
          playwright install chromium

      - name: Run scrapers
        run: python main.py

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Daily update $(date +'%Y-%m-%d')"
          git push
