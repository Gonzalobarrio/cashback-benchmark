name: Daily Cashback Benchmark

on:
  schedule:
    - cron: '0 7 * * *'  # Cada día a las 7:00 UTC (9:00 hora Polonia)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas playwright
          playwright install chromium

      - name: Run scrapers
        run: python main.py

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Daily update $(date +'%Y-%m-%d')"
          git push

      - name: Send Slack alerts
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python - <<'EOF'
          import pandas as pd
          import json
          import urllib.request
          import os

          webhook_url = os.environ["SLACK_WEBHOOK_URL"]
          df = pd.read_csv("data/benchmark_data.csv")

          # Retailers donde un competidor supera a iGraal en más de 5%
          alerts = df[
              (df["alert"] == "LOWER") &
              (df["delta"] >= 5) &
              (df["igraal_rate"].notna())
          ].sort_values("delta", ascending=False).head(10)

          if len(alerts) == 0:
              print("No alerts to send")
              exit()

          # Construye el mensaje
          lines = [f"*🚨 iGraal Cashback Alert — {pd.Timestamp.today().strftime('%Y-%m-%d')}*"]
          lines.append(f"Top retailers where competitors beat iGraal by >5%:\n")

          for _, row in alerts.iterrows():
              lines.append(
                  f"• *{row['retailer']}* — iGraal: {row['igraal_rate']}% | "
                  f"Best competitor: {row['best_competitor_rate']}% | "
                  f"Delta: +{row['delta']}%"
              )

          lines.append(f"\n_Total retailers where competitor beats iGraal: {(df['alert']=='LOWER').sum()}_")

          message = {"text": "\n".join(lines)}

          req = urllib.request.Request(
              webhook_url,
              data=json.dumps(message).encode("utf-8"),
              headers={"Content-Type": "application/json"}
          )
          urllib.request.urlopen(req)
          print(f"✅ Slack alert sent with {len(alerts)} retailers")
          EOF
