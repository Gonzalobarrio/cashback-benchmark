name: Sync Preset Data

on:
  schedule:
    - cron: '0 7 1 * *'   # 1º de cada mes a las 7:00 UTC (9:00 Polonia)
  workflow_dispatch:        # trigger manual desde GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run Preset sync
        env:
          PRESET_API_TOKEN:     ${{ secrets.PRESET_API_TOKEN }}
          PRESET_API_SECRET:    ${{ secrets.PRESET_API_SECRET }}
          PRESET_WORKSPACE_URL: ${{ secrets.PRESET_WORKSPACE_URL }}
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:          ${{ github.repository }}
        run: python scripts/sync_preset.py

      - name: Notify Slack on success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d '{"text":"✅ *Preset sync OK* — retailer_financials.csv y retailer_metadata.csv actualizados"}'

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d '{"text":"❌ *Preset sync FALLIDO* — revisar logs en GitHub Actions"}'
